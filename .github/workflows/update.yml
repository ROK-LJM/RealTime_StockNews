name: 시세·뉴스 갱신

# 5분마다 자동 실행 + 수동 실행 + 코드 푸시 시 실행
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]

# 데이터 JSON을 저장소에 커밋해야 하므로 쓰기 권한 필요
permissions:
  contents: write

# 동시 실행 방지
concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 시세·뉴스 받아 JSON 생성
        run: node scripts/fetch.mjs

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: $(date -u +%FT%TZ)"
            # 사람이 동시에 config를 수정했을 수 있으니 최신 main에 맞춰 재적용 후 푸시
            git pull --rebase --autostash origin main || true
            git push origin HEAD:main
          fi
